<!DOCTYPE html>
<html>
<head>

<title>Novance Movies</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:red;
}

.movies{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.movie{
width:200px;
}

.movie img{
width:100%;
border-radius:10px;
}

button{
background:red;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🎬 NOVANCE MOVIES</h1>
<p>Chagua movie uangalie</p>

<div class="movies">

<div class="movie">
<img src="https://img.youtube.com/vi/VIDEO1/hqdefault.jpg">
<br><br>
<button onclick="watch1()">Watch</button>
</div>

<div class="movie">
<img src="https://img.youtube.com/vi/VIDEO2/hqdefault.jpg">
<br><br>
<button onclick="watch2()">Watch</button>
</div>

</div>

<br><br>

<div id="player"></div>

<script>

function watch1(){
document.getElementById("player").innerHTML =
'<iframe width="350" height="200" src="https://www.youtube.com/embed/VIDEO1" frameborder="0" allowfullscreen></iframe>';
}

function watch2(){
document.getElementById("player").innerHTML =
'<iframe width="350" height="200" src="https://www.youtube.com/embed/VIDEO2" frameborder="0" allowfullscreen></iframe>';
}

</script>

</body>
</html>
